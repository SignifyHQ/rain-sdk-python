name: Integration Tests

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6am UTC
  workflow_dispatch: {}

jobs:
  test-integration:
    timeout-minutes: 10
    name: integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.9"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Run integration tests
        run: uv run pytest tests/custom/integration/ -m integration -x -n0
        env:
          RAIN_SANDBOX_API_KEY: ${{ secrets.RAIN_SANDBOX_API_KEY }}
